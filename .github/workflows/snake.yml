name: Generate Snake Animation

on:
  schedule:
    # سيتم التشغيل التلقائي كل 24 ساعة
    - cron: "0 0 * * *" 
  
  # يسمح لك بتشغيل السكريبت يدوياً في أي وقت
  workflow_dispatch:
  
  # سيتم التشغيل عند كل تحديث في المستودع
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#F7B731

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
